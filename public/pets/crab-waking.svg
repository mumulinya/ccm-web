<?xml version="1.0" encoding="UTF-8"?>
<svg id="crab-waking" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Crab waking">

  <defs>
    <linearGradient id="crab-waking-body" x1="28" y1="18" x2="96" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1f3"/>
      <stop offset="0.45" stop-color="#ffb3be"/>
      <stop offset="1" stop-color="#ff7b8d"/>
    </linearGradient>
    <linearGradient id="crab-waking-accent" x1="36" y1="18" x2="90" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#7b2740"/>
    </linearGradient>
    <radialGradient id="crab-waking-shine" cx="36%" cy="24%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#ffffff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="crab-waking-soft-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#10203a" flood-opacity="0.14"/>
    </filter>
    <filter id="crab-waking-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .pet-core { transform-origin:64px 72px; animation: pet-breathe 2.8s ease-in-out infinite; }
    .tail { transform-origin:76px 75px; animation: tail-sway 2.4s ease-in-out infinite; }
    .ear { transform-origin:center; animation: ear-twitch 5s ease-in-out infinite; }
    .arm-left { transform-origin:46px 74px; animation: arm-left 2.1s ease-in-out infinite; }
    .arm-right { transform-origin:82px 74px; animation: arm-right 2.1s ease-in-out infinite; }
    .blink { transform-origin:center; animation: blink 5.2s ease-in-out infinite; }
    .float-prop { animation: prop-float 2.4s ease-in-out infinite; }
    .pulse { animation: pulse 1.3s ease-in-out infinite; transform-origin:center; }
    .spin { animation: spin 3.2s linear infinite; transform-origin:center; }
    .work-tap { animation: tap 0.55s ease-in-out infinite; transform-origin:64px 95px; }
    .sleep-drift { animation: sleep-drift 3.6s ease-in-out infinite; }
    .music-note { animation: note-rise 1.8s ease-in-out infinite; opacity:0; }
    .music-note.n2 { animation-delay:0.45s; }
    .music-note.n3 { animation-delay:0.9s; }
    .juggle-ball { animation: juggle 1.25s ease-in-out infinite; }
    .juggle-ball.b2 { animation-delay:0.22s; }
    .juggle-ball.b3 { animation-delay:0.44s; }
    .spark { animation: sparkle 1.7s ease-in-out infinite; transform-origin:center; }
    .spark.s2 { animation-delay:0.35s; }
    .spark.s3 { animation-delay:0.7s; }
    .state-error .pet-core { animation: shake 0.28s linear infinite; }
    .state-sweeping .arm-right { animation: sweep 0.9s ease-in-out infinite; }
    .state-react .pet-core { animation: pop 0.75s ease-in-out infinite; }
    .state-sleeping .pet-core, .state-dozing .pet-core, .state-collapsing .pet-core { animation: sleep-breathe 3.8s ease-in-out infinite; }
    @keyframes pet-breathe { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.025,0.985)} }
    @keyframes sleep-breathe { 0%,100%{transform:translateY(1px) scale(1,0.98)} 50%{transform:translateY(-1px) scale(1.02,1)} }
    @keyframes tail-sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(9deg)} }
    @keyframes ear-twitch { 0%,92%,100%{transform:rotate(0)} 95%{transform:rotate(-8deg)} }
    @keyframes arm-left { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-7deg)} }
    @keyframes arm-right { 0%,100%{transform:rotate(0)} 50%{transform:rotate(7deg)} }
    @keyframes blink { 0%,91%,100%{transform:scaleY(1)} 94%{transform:scaleY(0.12)} }
    @keyframes prop-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pulse { 0%,100%{transform:scale(1); opacity:.72} 50%{transform:scale(1.18); opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes tap { 0%,100%{transform:translateY(0)} 50%{transform:translateY(2px)} }
    @keyframes sleep-drift { 0%{transform:translate(0,0);opacity:0} 20%{opacity:1} 100%{transform:translate(12px,-22px);opacity:0} }
    @keyframes note-rise { 0%{transform:translateY(8px) scale(.8);opacity:0} 25%{opacity:1} 100%{transform:translateY(-18px) scale(1.08);opacity:0} }
    @keyframes juggle { 0%,100%{transform:translateY(7px)} 50%{transform:translateY(-15px)} }
    @keyframes sparkle { 0%,100%{transform:scale(.75) rotate(0);opacity:.45} 50%{transform:scale(1.15) rotate(16deg);opacity:1} }
    @keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,1px)} 75%{transform:translate(1px,-1px)} }
    @keyframes sweep { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(18deg)} }
    @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.055)} }
  </style>
  <ellipse cx="64" cy="116" rx="34" ry="7" fill="#0f172a" opacity=".12"/>
  <g class="state-waking" >
    <g class="pet-core">
      
    <g filter="url(#crab-waking-soft-shadow)">
      <g stroke="#8a2b3e" stroke-width="4.2" stroke-linecap="round">
        <path d="M42 62 C36 48 30 40 22 38"/>
        <path d="M86 62 C92 48 98 40 106 38"/>
        <path d="M42 90 L28 101 M51 95 L42 108 M77 95 L86 108 M86 90 L100 101" opacity=".72"/>
      </g>
      <g class="arm-left">
        <path d="M28 39 C12 34 13 16 27 15 C38 15 43 28 33 38" fill="#ffb3be" stroke="#8a2b3e" stroke-width="3.5"/>
        <path d="M26 17 L21 32" stroke="#8a2b3e" stroke-width="3" stroke-linecap="round"/>
      </g>
      <g class="arm-right">
        <path d="M100 39 C116 34 115 16 101 15 C90 15 85 28 95 38" fill="#ffb3be" stroke="#8a2b3e" stroke-width="3.5"/>
        <path d="M102 17 L107 32" stroke="#8a2b3e" stroke-width="3" stroke-linecap="round"/>
      </g>
      <ellipse cx="64" cy="76" rx="38" ry="29" fill="url(#crab-waking-body)" stroke="#8a2b3e" stroke-width="4.2"/>
      <ellipse cx="55" cy="64" rx="18" ry="10" fill="url(#crab-waking-shine)" opacity=".58"/>
      <path d="M40 66 C48 53 80 53 88 66" fill="#fff1f3" opacity=".4"/>
      <path d="M53 51 L48 34 M75 51 L80 34" stroke="#8a2b3e" stroke-width="4" stroke-linecap="round"/>
      <circle cx="48" cy="32" r="9" fill="#fff1f3" stroke="#8a2b3e" stroke-width="3"/>
      <circle cx="80" cy="32" r="9" fill="#fff1f3" stroke="#8a2b3e" stroke-width="3"/>
      <g class="blink"><circle cx="48" cy="32" r="3.7" fill="#7b2740"/><circle cx="80" cy="32" r="3.7" fill="#7b2740"/><circle cx="49.3" cy="30.8" r="1" fill="#fff"/><circle cx="81.3" cy="30.8" r="1" fill="#fff"/></g>
      
    <path d="M64 76 V79" stroke="#7b2740" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M56 78 Q60 84 64 79 Q68 84 72 78" stroke="#7b2740" stroke-width="2.7" fill="none" stroke-linecap="round"/>
      
    <ellipse cx="42" cy="74" rx="5.5" ry="3.8" fill="#ffd1d8" opacity=".5"/>
    <ellipse cx="86" cy="74" rx="5.5" ry="3.8" fill="#ffd1d8" opacity=".5"/>
    </g>
    </g>
    
      <g class="pulse">
        <circle cx="96" cy="27" r="10" fill="#facc15"/>
        <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
          <path d="M96 10 V4 M96 50 V56 M79 27 H73 M119 27 H113 M84 15 L79 10 M108 15 L113 10 M84 39 L79 44 M108 39 L113 44"/>
        </g>
      </g>
  </g>
</svg>
