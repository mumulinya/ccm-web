<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    /* 🐼 东张西望 + 挥手 — 12秒循环 */
    .body-sway {
      transform-origin: 32px 46px;
      animation: body-sway 12s infinite ease-in-out;
    }
    .head-look {
      transform-origin: 32px 30px;
      animation: head-look 12s infinite ease-in-out;
    }
    .eyes-track {
      animation: eyes-track 12s infinite ease-in-out;
    }
    .eyes-blink {
      transform-origin: 32px 27px;
      animation: eyes-blink 12s infinite linear;
    }
    .ear-perk {
      transform-origin: 32px 28px;
      animation: ear-react 12s infinite ease-in-out;
    }
    .wave-arm {
      transform-origin: 50px 44px;
      animation: wave-arm 12s infinite ease-in-out;
    }
    .butterfly {
      animation: butterfly-fly 12s infinite ease-in-out;
    }
    .butterfly-wings {
      transform-origin: 0px 0px;
      animation: wing-flap 0.4s infinite ease-in-out;
    }
    .breathe {
      transform-origin: 32px 46px;
      animation: breathe 3s infinite ease-in-out;
    }

    @keyframes body-sway {
      0%,100%  { transform: translate(0,0); }
      20%,30%  { transform: translate(1px,0); }
      55%,65%  { transform: translate(-1px,0); }
      80%      { transform: translate(0.5px,0); }
    }
    @keyframes head-look {
      0%,15%   { transform: rotate(0deg) translate(0,0); }
      20%,30%  { transform: rotate(5deg) translate(1px,0); }
      35%,45%  { transform: rotate(0deg) translate(0,0); }
      50%,60%  { transform: rotate(-5deg) translate(-1px,0); }
      65%,75%  { transform: rotate(0deg) translate(0,0); }
      80%,88%  { transform: rotate(3deg) translate(0.5px,-0.5px); }
      92%,100% { transform: rotate(0deg) translate(0,0); }
    }
    @keyframes eyes-track {
      0%,15%   { transform: translate(0,0); }
      20%,30%  { transform: translate(2px,0); }
      35%,45%  { transform: translate(0,0); }
      50%,60%  { transform: translate(-2px,0); }
      65%,75%  { transform: translate(0,0); }
      80%,88%  { transform: translate(1px,-1px); }
      92%,100% { transform: translate(0,0); }
    }
    @keyframes eyes-blink {
      0%,4%    { transform: scaleY(1); }
      5%       { transform: scaleY(0.1); }
      7%,28%   { transform: scaleY(1); }
      30%      { transform: scaleY(0.1); }
      32%,52%  { transform: scaleY(1); }
      54%      { transform: scaleY(0.1); }
      56%,78%  { transform: scaleY(1); }
      80%      { transform: scaleY(0.1); }
      82%,100% { transform: scaleY(1); }
    }
    @keyframes ear-react {
      0%,18%   { transform: rotate(0deg); }
      20%      { transform: rotate(6deg); }
      24%      { transform: rotate(-3deg); }
      28%,48%  { transform: rotate(0deg); }
      50%      { transform: rotate(-5deg); }
      54%      { transform: rotate(2deg); }
      58%,100% { transform: rotate(0deg); }
    }
    @keyframes wave-arm {
      0%,70%   { transform: translate(0,0) rotate(0deg); }
      75%      { transform: translate(1px,-4px) rotate(-25deg); }
      78%      { transform: translate(1px,-5px) rotate(-35deg); }
      80%      { transform: translate(1px,-4px) rotate(-20deg); }
      82%      { transform: translate(1px,-5px) rotate(-35deg); }
      84%      { transform: translate(1px,-4px) rotate(-20deg); }
      86%      { transform: translate(1px,-5px) rotate(-35deg); }
      90%,100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes butterfly-fly {
      0%       { transform: translate(-10px,30px) scale(0); opacity:0; }
      15%      { transform: translate(0px,15px) scale(0.8); opacity:1; }
      25%      { transform: translate(15px,5px) scale(1); opacity:1; }
      40%      { transform: translate(25px,-5px) scale(1); opacity:1; }
      55%      { transform: translate(20px,8px) scale(1); opacity:1; }
      70%      { transform: translate(30px,-2px) scale(0.9); opacity:1; }
      85%      { transform: translate(45px,-10px) scale(0.7); opacity:0.5; }
      100%     { transform: translate(60px,-20px) scale(0); opacity:0; }
    }
    @keyframes wing-flap {
      0%,100% { transform: scaleX(1); }
      50%     { transform: scaleX(0.3); }
    }
    @keyframes breathe {
      0%,100% { transform: scale(1) translateY(0); }
      50%     { transform: scale(1.02,0.98) translateY(0.5px); }
    }
  </style>
</defs>

<!-- 影子 -->
<ellipse cx="32" cy="60" rx="18" ry="3" fill="#000" opacity="0.12"/>

<!-- 蝴蝶 -->
<g class="butterfly" transform="translate(8,20)">
  <g class="butterfly-wings">
    <path d="M 0,0 Q -4,-4 -2,-7 Q 0,-4 0,0" fill="#c084fc" opacity="0.8"/>
    <path d="M 0,0 Q 4,-4 2,-7 Q 0,-4 0,0" fill="#a855f7" opacity="0.8"/>
    <path d="M 0,0 Q -3,3 -1,5 Q 0,3 0,0" fill="#e879f9" opacity="0.7"/>
    <path d="M 0,0 Q 3,3 1,5 Q 0,3 0,0" fill="#d946ef" opacity="0.7"/>
  </g>
  <circle r="0.5" fill="#4a044e"/>
</g>

<g class="body-sway">
  <g class="breathe">
    <!-- 身体 -->
    <ellipse cx="32" cy="46" rx="20" ry="14" fill="#ffffff" stroke="#1e293b" stroke-width="2.5"/>
    <circle cx="18" cy="48" r="6" fill="#1e293b"/>
    
    <!-- 围脖/前肢 -->
    <path d="M 12 40 C 20 44, 44 44, 52 40 C 48 50, 16 50, 12 40 Z" fill="#1e293b"/>

    <!-- 右手臂 (挥手) -->
    <g class="wave-arm">
      <circle cx="48" cy="46" r="6" fill="#1e293b"/>
    </g>

    <g class="head-look">
      <g class="ear-perk">
        <!-- 耳朵 -->
        <circle cx="16" cy="18" r="8" fill="#1e293b"/>
        <circle cx="16" cy="18" r="4" fill="#0f172a"/>
        <circle cx="48" cy="18" r="8" fill="#1e293b"/>
        <circle cx="48" cy="18" r="4" fill="#0f172a"/>
      </g>

      <!-- 头部底盘 -->
      <circle cx="32" cy="28" r="18" fill="#ffffff" stroke="#1e293b" stroke-width="2.5"/>

      <!-- 黑眼圈 -->
      <ellipse cx="24" cy="27" rx="6" ry="7" transform="rotate(-15 24 27)" fill="#1e293b"/>
      <ellipse cx="40" cy="27" rx="6" ry="7" transform="rotate(15 40 27)" fill="#1e293b"/>

      <g class="eyes-track">
        <g class="eyes-blink">
          <!-- 眼睛 -->
          <circle cx="25" cy="26" r="2" fill="#ffffff"/>
          <circle cx="26" cy="25" r="0.75" fill="#38bdf8"/>
          <circle cx="39" cy="26" r="2" fill="#ffffff"/>
          <circle cx="38" cy="25" r="0.75" fill="#38bdf8"/>
        </g>
      </g>

      <!-- 腮红 -->
      <circle cx="17" cy="33" r="3" fill="#fda4af" opacity="0.6"/>
      <circle cx="47" cy="33" r="3" fill="#fda4af" opacity="0.6"/>

      <!-- 鼻子 -->
      <polygon points="30,31 34,31 32,33" fill="#1e293b"/>
      
      <!-- 嘴巴 -->
      <path d="M 30,34 Q 32,36 34,34" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</g>
</svg>
