<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
<defs>
    <style>
      .breathe { transform-origin: 32px 46px; animation: breathe 3s infinite ease-in-out; }
      .blink { transform-origin: 32px 28px; animation: blink 4.5s infinite ease-in-out; }
      .tail { transform-origin: 38px 42px; animation: tail-wag 2s infinite ease-in-out; }
      @keyframes breathe { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.018, 0.982) translateY(0.4px)} }
      @keyframes blink { 0%,8%,12%,100%{transform:scaleY(1)} 10%{transform:scaleY(0.1)} }
      @keyframes tail-wag { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(7deg)} }
    </style>
  </defs>
<g class="breathe">
  <g class="tail">
<!-- 蓬松尾巴 -->
  <path d="M 40 45 C 52 48, 56 38, 52 32 C 48 26, 44 34, 38 42 Z" fill="#f97316" stroke="#c2410c" stroke-width="2" />
  <path d="M 52 32 C 54 30, 50 28, 48 30 Z" fill="#ffffff" />

  </g>
<!-- 身体 -->
  <ellipse cx="32" cy="46" rx="14" ry="12" fill="#f97316" stroke="#c2410c" stroke-width="2" />
  <!-- 白肚子 -->
  <circle cx="32" cy="46" r="8" fill="#ffffff" />

  <!-- 大耳朵 -->
  <polygon points="16,24 10,6 26,16" fill="#f97316" stroke="#c2410c" stroke-width="2" />
  <polygon points="16,22 12,9 23,16" fill="#fef3c7" />

  <polygon points="48,24 54,6 38,16" fill="#f97316" stroke="#c2410c" stroke-width="2" />
  <polygon points="48,22 52,9 41,16" fill="#fef3c7" />

  <!-- 头部底盘 (橙色圆润三角) -->
  <path d="M 16 32 C 16 22, 48 22, 48 32 C 48 40, 32 44, 16 32 Z" fill="#f97316" stroke="#c2410c" stroke-width="2" />
  
  <!-- 白脸颊 -->
  <path d="M 16 32 C 18 36, 26 38, 30 35 C 28 30, 18 28, 16 32 Z" fill="#ffffff" />
  <path d="M 48 32 C 46 36, 38 38, 34 35 C 36 30, 46 28, 48 32 Z" fill="#ffffff" />

  <g class="blink">
<!-- 眼睛 (专注) -->
  <ellipse cx="25" cy="28" rx="3.5" ry="2" fill="#1e293b" />
  <circle cx="26" cy="28" r="1" fill="#ffffff" />
  
  <ellipse cx="39" cy="28" rx="3.5" ry="2" fill="#1e293b" />
  <circle cx="38" cy="28" r="1" fill="#ffffff" />

  </g>
<!-- 腮红 -->
  <circle cx="20" cy="33" r="2" fill="#fda4af" opacity="0.6" />
  <circle cx="44" cy="33" r="2" fill="#fda4af" opacity="0.6" />

  <!-- 鼻子 -->
  <polygon points="30,35 34,35 32,37" fill="#0f172a" />

  <!-- 嘴巴 -->
  <path d="M 30,38 Q 32,39 34,38" fill="none" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round" />

  <!-- 戴着的蓝色耳机 -->
  <path d="M 18,26 A 15,15 0 0,1 46,26" fill="none" stroke="#334155" stroke-width="2.5" />
  <circle cx="16" cy="26" r="4.5" fill="#3b82f6" stroke="#334155" stroke-width="1" />
  <circle cx="48" cy="26" r="4.5" fill="#3b82f6" stroke="#334155" stroke-width="1" />

  <!-- 抱着扫帚 -->
  <line x1="26" y1="36" x2="36" y2="56" stroke="#a16207" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 32 48 L 28 58 L 38 56 Z" fill="#eab308" stroke="#ca8a04" stroke-width="1.5" />
  <!-- 肢爪 (抱着扫帚) -->
  <circle cx="27" cy="46" r="3" fill="#1e293b" stroke="#1e293b" stroke-width="1" />
  <circle cx="35" cy="46" r="3" fill="#1e293b" stroke="#1e293b" stroke-width="1" />
</g>
</svg>
