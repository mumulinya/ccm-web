<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
<defs>
    <style>
      .breathe { transform-origin: 32px 46px; animation: breathe 3s infinite ease-in-out; }
      .blink { transform-origin: 32px 30px; animation: blink 4s infinite ease-in-out; }
      .ear-wiggle { transform-origin: 32px 24px; animation: wiggle 6s infinite ease-in-out; }
      @keyframes breathe { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.02, 0.98) translateY(0.5px)} }
      @keyframes blink { 0%,8%,12%,100%{transform:scaleY(1)} 10%{transform:scaleY(0.15)} }
      @keyframes wiggle { 0%,90%,100%{transform:rotate(0deg)} 93%{transform:rotate(-3deg)} 96%{transform:rotate(3deg)} }
    </style>
  </defs>
<g class="breathe">
  <!-- 尾巴 -->
  <circle cx="16" cy="48" r="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- 身体 -->
  <ellipse cx="32" cy="46" rx="16" ry="13" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <circle cx="32" cy="46" r="9" fill="#ffffff" />
  
  <!-- 肢爪 (左爪抬起托腮) -->
  <circle cx="22" cy="55" r="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5" />
  <!-- 抬起托腮的右爪 -->
  <circle cx="43" cy="38" r="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- 耳朵 (耷拉一只表示思考) -->
  <!-- 左耳 (竖立) -->
  <path d="M 20 24 C 18 10, 24 6, 26 24 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <path d="M 21 22 C 20 12, 23 9, 24 22 Z" fill="#fecdd3" />
  <!-- 右耳 (弯折耷拉) -->
  <path d="M 44 24 C 52 20, 50 12, 40 18 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- 头部底盘 -->
  <circle cx="32" cy="30" r="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  
  <g class="blink">
<!-- 眼睛 (困惑，微闭或看天) -->
  <path d="M 22,29 Q 25,26 28,29" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="39" cy="27" r="3" fill="#f43f5e" />
  <circle cx="38" cy="26" r="1" fill="#ffffff" />
  
  </g>
<!-- 腮红 -->
  <circle cx="19" cy="34" r="2" fill="#fda4af" opacity="0.6" />
  <circle cx="45" cy="34" r="2" fill="#fda4af" opacity="0.6" />
  
  <!-- 鼻子 -->
  <polygon points="31,33 33,33 32,34.5" fill="#f43f5e" />
  
  <!-- 嘴巴 (圆圈，唔...) -->
  <circle cx="32" cy="37" r="2" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- 思考气泡和问号 -->
  <circle cx="52" cy="18" r="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1" />
  <text x="52" y="21" font-size="8" font-family="sans-serif" font-weight="bold" fill="#0284c7" text-anchor="middle">?</text>
  <circle cx="46" cy="22" r="2.5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1" />
  <circle cx="42" cy="25" r="1.5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1" />
</g>
</svg>
