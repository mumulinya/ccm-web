<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 小猫咪 - 像素风格 -->
  <!-- 耳朵 -->
  <polygon points="14,18 20,6 26,18" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <polygon points="38,18 44,6 50,18" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <polygon points="16,18 20,10 24,18" fill="#FFB74D"/>
  <polygon points="40,18 44,10 48,18" fill="#FFB74D"/>
  <!-- 头 -->
  <ellipse cx="32" cy="30" rx="20" ry="16" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <!-- 眼睛 -->
  <ellipse cx="24" cy="28" rx="4" ry="5" fill="white"/>
  <ellipse cx="40" cy="28" rx="4" ry="5" fill="white"/>
  <ellipse cx="25" cy="29" rx="2.5" ry="3" fill="#1a1a2e"/>
  <ellipse cx="41" cy="29" rx="2.5" ry="3" fill="#1a1a2e"/>
  <!-- 瞳孔高光 -->
  <circle cx="26" cy="27" r="1" fill="white"/>
  <circle cx="42" cy="27" r="1" fill="white"/>
  <!-- 鼻子 -->
  <polygon points="32,33 30,35 34,35" fill="#E91E63"/>
  <!-- 嘴巴 -->
  <path d="M28,36 Q32,40 36,36" fill="none" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="8" y1="30" x2="20" y2="32" stroke="#E65100" stroke-width="0.8"/>
  <line x1="8" y1="34" x2="20" y2="34" stroke="#E65100" stroke-width="0.8"/>
  <line x1="44" y1="32" x2="56" y2="30" stroke="#E65100" stroke-width="0.8"/>
  <line x1="44" y1="34" x2="56" y2="34" stroke="#E65100" stroke-width="0.8"/>
  <!-- 身体 -->
  <ellipse cx="32" cy="50" rx="14" ry="10" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <!-- 尾巴 -->
  <path d="M46,48 Q58,42 54,54" fill="none" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
  <path d="M46,48 Q58,42 54,54" fill="none" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
</svg>