<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
<defs>
  <style>
    .sleep{transform-origin:7.5px 13px;animation:sf 4s infinite ease-in-out}
    .zzz{opacity:0;animation:zz 3s infinite ease-out} .z1{animation-delay:0s} .z2{animation-delay:1s} .z3{animation-delay:2s}
    @keyframes sf{0%,100%{transform:translateY(0) scale(0.97)} 50%{transform:translateY(3px) scale(0.95) rotate(-2deg)}}
    @keyframes zz{0%{opacity:0;transform:translate(0,0) scale(0.7)} 20%{opacity:0.7;transform:translate(4px,-4px) scale(1)} 100%{opacity:0;transform:translate(12px,-18px) scale(1.3)}}
  </style>
</defs>
<rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.3"/>
<text class="zzz z1" x="16" y="4" font-size="4" fill="#94a3b8" font-weight="bold" opacity="0.6">z</text>
<text class="zzz z2" x="20" y="-2" font-size="5" fill="#94a3b8" font-weight="bold" opacity="0.5">z</text>
<text class="zzz z3" x="24" y="-8" font-size="6" fill="#94a3b8" font-weight="bold" opacity="0.4">z</text>
<g class="sleep" opacity="0.8">
  <g fill="#E8614D"><rect x="3" y="11" width="1" height="4"/><rect x="5" y="11" width="1" height="4"/><rect x="9" y="11" width="1" height="4"/><rect x="11" y="11" width="1" height="4"/><rect x="2" y="6" width="11" height="7"/><rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/></g>
  <g fill="#000"><rect x="4" y="9" width="2" height="0.5"/><rect x="10" y="9" width="2" height="0.5"/></g>
  <rect x="6" y="11" width="3" height="0.5" fill="#C44536" opacity="0.4"/>
</g>
</svg>