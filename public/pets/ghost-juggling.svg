<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 小幽灵 - 像素风格 -->
  <!-- 身体 -->
  <path d="M16,30 Q16,10 32,10 Q48,10 48,30 L48,50 L42,44 L36,50 L30,44 L24,50 L18,44 L16,50 Z" fill="#B39DDB" stroke="#7E57C2" stroke-width="1.5"/>
  <!-- 内部高光 -->
  <path d="M20,28 Q20,14 32,14 Q44,14 44,28 L44,20 Q44,14 32,14 Q20,14 20,20 Z" fill="#D1C4E9" opacity="0.5"/>
  <!-- 眼睛 -->
  <ellipse cx="26" cy="26" rx="5" ry="6" fill="white"/>
  <ellipse cx="38" cy="26" rx="5" ry="6" fill="white"/>
  <ellipse cx="27" cy="27" rx="3" ry="4" fill="#1a1a2e"/>
  <ellipse cx="39" cy="27" rx="3" ry="4" fill="#1a1a2e"/>
  <circle cx="28" cy="25" r="1.2" fill="white"/>
  <circle cx="40" cy="25" r="1.2" fill="white"/>
  <!-- 嘴巴 -->
  <ellipse cx="32" cy="36" rx="3" ry="2" fill="#7E57C2"/>
  <!-- 腮红 -->
  <ellipse cx="20" cy="32" rx="3" ry="2" fill="#F48FB1" opacity="0.5"/>
  <ellipse cx="44" cy="32" rx="3" ry="2" fill="#F48FB1" opacity="0.5"/>

<g class="juggle"><style>.juggle circle{animation:juggle 1.2s infinite ease-in-out}.juggle circle:nth-child(2){animation-delay:.2s}.juggle circle:nth-child(3){animation-delay:.4s}@keyframes juggle{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}</style><circle cx="22" cy="11" r="3" fill="#38bdf8"/><circle cx="32" cy="7" r="3" fill="#f472b6"/><circle cx="42" cy="11" r="3" fill="#a3e635"/></g>
</svg>