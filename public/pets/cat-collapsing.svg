<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    .sleep-float { transform-origin: 32px 40px; animation: sleep-float 4s infinite ease-in-out; }
    @keyframes sleep-float { 0%,100%{transform:translateY(0) scale(0.97)} 50%{transform:translateY(3px) scale(0.95) rotate(-2deg)} }
    .zzz { opacity:0; animation: zzz 3s infinite ease-out; }
    .z1{animation-delay:0s} .z2{animation-delay:1s} .z3{animation-delay:2s}
    @keyframes zzz { 0%{opacity:0;transform:translate(0,0) scale(0.7)} 20%{opacity:0.8;transform:translate(4px,-4px) scale(1)} 100%{opacity:0;transform:translate(12px,-18px) scale(1.3)} }
  </style>
</defs>
<ellipse cx="32" cy="58" rx="14" ry="3" fill="#000" opacity="0.1"/>
<!-- Zzz -->
<g class="zzz z1"><text x="44" y="16" font-size="10" fill="#94a3b8" font-weight="bold" opacity="0.7">z</text></g>
<g class="zzz z2"><text x="50" y="10" font-size="12" fill="#94a3b8" font-weight="bold" opacity="0.6">z</text></g>
<g class="zzz z3"><text x="56" y="4" font-size="14" fill="#94a3b8" font-weight="bold" opacity="0.5">z</text></g>
<g class="sleep-float">
  <ellipse cx="32" cy="42" rx="16" ry="12" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="32" cy="40" rx="14" ry="10" fill="#FFB74D" opacity="0.8"/>
  <ellipse cx="32" cy="24" rx="14" ry="12" fill="#FF9800" opacity="0.8"/>
  <polygon points="18,16 22,4 28,16" fill="#FF9800" opacity="0.8"/>
  <polygon points="36,16 42,4 46,16" fill="#FF9800" opacity="0.8"/>
  <!-- Closed eyes (sleeping) -->
  <line x1="22" y1="23" x2="30" y2="23" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="23" x2="42" y2="23" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small mouth -->
  <ellipse cx="32" cy="29" rx="2" ry="1.5" fill="#E65100" opacity="0.5"/>
  <!-- Curled up tail -->
  <path d="M46,46 Q56,42 50,48 Q44,54 46,46" fill="#FF9800" opacity="0.7"/>
  <!-- Paw tucked -->
  <ellipse cx="24" cy="50" rx="5" ry="3" fill="#FF9800" opacity="0.7"/>
  <ellipse cx="40" cy="50" rx="5" ry="3" fill="#FF9800" opacity="0.7"/>
</g>

<g><path d="M16 55 C24 60 42 60 50 55" stroke="#64748b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.45"/><text x="44" y="15" font-size="7" fill="#94a3b8" font-family="Arial">...</text></g>
</svg>