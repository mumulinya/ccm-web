<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 小机器人 - 像素风格 -->
  <!-- 天线 -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#78909C" stroke-width="2"/>
  <circle cx="32" cy="4" r="3" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <!-- 头 -->
  <rect x="16" y="14" width="32" height="24" rx="4" fill="#607D8B" stroke="#37474F" stroke-width="1.5"/>
  <!-- 眼睛 -->
  <rect x="22" y="20" width="8" height="6" rx="2" fill="#1a1a2e"/>
  <rect x="34" y="20" width="8" height="6" rx="2" fill="#1a1a2e"/>
  <!-- 眼睛高光 -->
  <rect x="24" y="21" width="3" height="2" rx="1" fill="#4FC3F7"/>
  <rect x="36" y="21" width="3" height="2" rx="1" fill="#4FC3F7"/>
  <!-- 嘴巴 -->
  <rect x="24" y="30" width="16" height="4" rx="2" fill="#37474F"/>
  <rect x="26" y="31" width="4" height="2" rx="1" fill="#4FC3F7"/>
  <rect x="32" y="31" width="4" height="2" rx="1" fill="#4FC3F7"/>
  <!-- 耳朵 -->
  <rect x="10" y="20" width="6" height="10" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>
  <rect x="48" y="20" width="6" height="10" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>
  <!-- 身体 -->
  <rect x="18" y="40" width="28" height="16" rx="3" fill="#607D8B" stroke="#37474F" stroke-width="1.5"/>
  <!-- 身体面板 -->
  <rect x="24" y="43" width="16" height="8" rx="2" fill="#37474F"/>
  <circle cx="28" cy="47" r="2" fill="#4CAF50"/>
  <circle cx="36" cy="47" r="2" fill="#FF5722"/>
  <!-- 手臂 -->
  <rect x="8" y="42" width="8" height="4" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>
  <rect x="48" y="42" width="8" height="4" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>
  <!-- 脚 -->
  <rect x="22" y="56" width="8" height="6" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>
  <rect x="34" y="56" width="8" height="6" rx="2" fill="#78909C" stroke="#37474F" stroke-width="1"/>

<g><path d="M18 12 L12 7" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/><path d="M32 9 V2" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/><path d="M46 12 L52 7" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/></g>
</svg>