<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    /* 🦊 追蝴蝶/左右窥探 — 10秒循环 */
    .body-crouch {
      transform-origin: 32px 46px;
      animation: body-crouch 10s infinite ease-in-out;
    }
    .head-track {
      transform-origin: 32px 30px;
      animation: head-track 10s infinite ease-in-out;
    }
    .tail-excited {
      transform-origin: 38px 42px;
      animation: tail-excited 10s infinite ease-in-out;
    }
    .eyes-wide {
      animation: eyes-follow 10s infinite ease-in-out;
    }
    .eyes-blink {
      transform-origin: 32px 28px;
      animation: eyes-blink 10s infinite linear;
    }
    .paw-pounce {
      transform-origin: 24px 54px;
      animation: paw-pounce 10s infinite ease-in-out;
    }
    .bug {
      animation: bug-path 10s infinite ease-in-out;
    }
    .bug-wings {
      transform-origin: 0px 0px;
      animation: bug-flap 0.25s infinite ease-in-out;
    }
    .breathe {
      transform-origin: 32px 46px;
      animation: breathe 3s infinite ease-in-out;
    }

    @keyframes body-crouch {
      0%,100%  { transform: scale(1,1) translateY(0); }
      20%      { transform: scale(1.02,0.98) translateY(1px); }
      40%      { transform: scale(1,1) translateY(0); }
      55%      { transform: scale(1.04,0.96) translateY(2px); }
      60%      { transform: scale(0.98,1.04) translateY(-3px); }
      65%      { transform: scale(1,1) translateY(0); }
    }
    @keyframes head-track {
      0%,10%   { transform: rotate(0deg) translate(0,0); }
      15%,25%  { transform: rotate(8deg) translate(2px,0); }
      30%,40%  { transform: rotate(-6deg) translate(-1.5px,0); }
      45%,52%  { transform: rotate(10deg) translate(3px,-1px); }
      55%,60%  { transform: rotate(5deg) translate(2px,2px); }
      65%,80%  { transform: rotate(-3deg) translate(-1px,0); }
      85%,100% { transform: rotate(0deg) translate(0,0); }
    }
    @keyframes tail-excited {
      0%,100%  { transform: rotate(-5deg); }
      10%      { transform: rotate(15deg); }
      20%      { transform: rotate(-10deg); }
      30%      { transform: rotate(12deg); }
      40%      { transform: rotate(-8deg); }
      50%      { transform: rotate(18deg); }
      60%      { transform: rotate(-12deg); }
      70%      { transform: rotate(10deg); }
      80%      { transform: rotate(-5deg); }
      90%      { transform: rotate(8deg); }
    }
    @keyframes eyes-follow {
      0%,10%   { transform: translate(0,0); }
      15%,25%  { transform: translate(3px,-0.5px); }
      30%,40%  { transform: translate(-2px,0.5px); }
      45%,52%  { transform: translate(4px,-1px); }
      55%,60%  { transform: translate(2px,2px); }
      65%,80%  { transform: translate(-1px,0); }
      85%,100% { transform: translate(0,0); }
    }
    @keyframes eyes-blink {
      0%,14%   { transform: scaleY(1); }
      15%      { transform: scaleY(0.1); }
      17%,44%  { transform: scaleY(1); }
      45%      { transform: scaleY(0.1); }
      47%,74%  { transform: scaleY(1); }
      75%      { transform: scaleY(0.1); }
      77%,100% { transform: scaleY(1); }
    }
    @keyframes paw-pounce {
      0%,50%   { transform: translate(0,0) rotate(0deg); }
      55%      { transform: translate(2px,-2px) rotate(-10deg); }
      58%      { transform: translate(4px,1px) rotate(5deg); }
      62%,100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes bug-path {
      0%       { transform: translate(-5px,25px); opacity:0; }
      10%      { transform: translate(5px,15px); opacity:1; }
      20%      { transform: translate(20px,8px); opacity:1; }
      35%      { transform: translate(10px,18px); opacity:1; }
      50%      { transform: translate(25px,5px); opacity:1; }
      60%      { transform: translate(15px,10px); opacity:1; }
      75%      { transform: translate(30px,0px); opacity:1; }
      90%      { transform: translate(40px,-10px); opacity:0.5; }
      100%     { transform: translate(50px,-15px); opacity:0; }
    }
    @keyframes bug-flap {
      0%,100% { transform: scaleY(1); }
      50%     { transform: scaleY(0.3); }
    }
    @keyframes breathe {
      0%,100% { transform: scale(1) translateY(0); }
      50%     { transform: scale(1.018,0.982) translateY(0.4px); }
    }
  </style>
</defs>

<!-- 影子 -->
<ellipse cx="32" cy="60" rx="16" ry="3" fill="#000" opacity="0.12"/>

<!-- 小虫子/萤火虫 -->
<g class="bug" transform="translate(8,20)">
  <g class="bug-wings">
    <ellipse cx="-2" cy="-1" rx="2" ry="1" fill="#a3e635" opacity="0.7"/>
    <ellipse cx="2" cy="-1" rx="2" ry="1" fill="#84cc16" opacity="0.7"/>
  </g>
  <circle r="1.5" fill="#eab308"/>
  <circle r="3" fill="#fef08a" opacity="0.3"/>
</g>

<g class="body-crouch">
  <g class="breathe">
    <g class="tail-excited">
      <!-- 蓬松尾巴 -->
      <path d="M 40 45 C 52 48, 56 38, 52 32 C 48 26, 44 34, 38 42 Z" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
      <path d="M 52 32 C 54 30, 50 28, 48 30 Z" fill="#ffffff"/>
    </g>

    <!-- 身体 -->
    <ellipse cx="32" cy="46" rx="14" ry="12" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
    <!-- 白肚子 -->
    <circle cx="32" cy="46" r="8" fill="#ffffff"/>

    <!-- 肢爪 -->
    <g class="paw-pounce">
      <circle cx="24" cy="54" r="3.5" fill="#1e293b"/>
    </g>
    <circle cx="40" cy="54" r="3.5" fill="#1e293b"/>

    <g class="head-track">
      <!-- 大耳朵 -->
      <polygon points="16,24 10,6 26,16" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
      <polygon points="16,22 12,9 23,16" fill="#fef3c7"/>
      <polygon points="48,24 54,6 38,16" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
      <polygon points="48,22 52,9 41,16" fill="#fef3c7"/>

      <!-- 头部底盘 -->
      <path d="M 16 32 C 16 22, 48 22, 48 32 C 48 40, 32 44, 16 32 Z" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
      
      <!-- 白脸颊 -->
      <path d="M 16 32 C 18 36, 26 38, 30 35 C 28 30, 18 28, 16 32 Z" fill="#ffffff"/>
      <path d="M 48 32 C 46 36, 38 38, 34 35 C 36 30, 46 28, 48 32 Z" fill="#ffffff"/>

      <g class="eyes-wide">
        <g class="eyes-blink">
          <!-- 大圆眼 (好奇) -->
          <circle cx="25" cy="28" r="4" fill="#1e293b"/>
          <circle cx="26.5" cy="26.5" r="1.5" fill="#ffffff"/>
          <circle cx="24" cy="28.5" r="0.6" fill="#ffffff"/>
          
          <circle cx="39" cy="28" r="4" fill="#1e293b"/>
          <circle cx="37.5" cy="26.5" r="1.5" fill="#ffffff"/>
          <circle cx="40" cy="28.5" r="0.6" fill="#ffffff"/>
        </g>
      </g>

      <!-- 腮红 -->
      <circle cx="20" cy="33" r="2" fill="#fda4af" opacity="0.6"/>
      <circle cx="44" cy="33" r="2" fill="#fda4af" opacity="0.6"/>

      <!-- 鼻子 -->
      <polygon points="30,35 34,35 32,37" fill="#0f172a"/>

      <!-- 嘴巴 (微微张开 兴奋) -->
      <path d="M 29,38 Q 32,40 35,38" fill="none" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>
</g>
</svg>
