<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    .shake { transform-origin: 32px 32px; animation: shake 0.15s infinite ease-in-out; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  </style>
</defs>
<ellipse cx="32" cy="58" rx="14" ry="3" fill="#000" opacity="0.15"/>
<g class="shake">
  <ellipse cx="32" cy="42" rx="16" ry="12" fill="#FF5722"/>
  <ellipse cx="32" cy="40" rx="14" ry="10" fill="#FF7043"/>
  <ellipse cx="32" cy="24" rx="14" ry="12" fill="#FF5722"/>
  <polygon points="18,16 22,4 28,16" fill="#FF5722"/><polygon points="20,16 23,8 26,16" fill="#FF7043"/>
  <polygon points="36,16 42,4 46,16" fill="#FF5722"/><polygon points="38,16 41,8 44,16" fill="#FF7043"/>
  <!-- X eyes -->
  <line x1="23" y1="19" x2="29" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="29" y1="19" x2="23" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="19" x2="41" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="41" y1="19" x2="35" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wavy mouth -->
  <path d="M26,30 Q29,28 32,30 Q35,32 38,30" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M48,16 Q50,12 50,16 Q50,19 48,18 Z" fill="#64B5F6" opacity="0.8"/>
  <ellipse cx="22" cy="52" rx="5" ry="3" fill="#FF5722"/>
  <ellipse cx="42" cy="52" rx="5" ry="3" fill="#FF5722"/>
</g>
</svg>