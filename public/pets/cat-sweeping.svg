<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    .bounce { transform-origin: 32px 50px; animation: bounce 0.4s infinite ease-in-out; }
    .paw-l { transform-origin: 18px 48px; animation: paw-l 0.3s infinite ease-in-out; }
    .paw-r { transform-origin: 46px 48px; animation: paw-r 0.25s infinite ease-in-out 0.1s; }
    .tail-fast { transform-origin: 50px 48px; animation: tail 0.6s infinite ease-in-out; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes paw-l { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-15deg)} }
    @keyframes paw-r { 0%,100%{transform:rotate(0)} 50%{transform:rotate(15deg)} }
    @keyframes tail { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(15deg)} }
    .data { opacity:0; animation: float-data 1.5s infinite linear; }
    .d1{animation-delay:0s} .d2{animation-delay:0.5s} .d3{animation-delay:1s}
    @keyframes float-data { 0%{opacity:0;transform:translateY(0)} 20%{opacity:0.8} 100%{opacity:0;transform:translateY(-20px)} }
  </style>
</defs>
<ellipse cx="32" cy="58" rx="14" ry="3" fill="#000" opacity="0.15"/>
<!-- Data particles -->
<g class="data d1"><rect x="10" y="10" width="3" height="1" rx="0.5" fill="#4CAF50" opacity="0.7"/></g>
<g class="data d2"><rect x="50" y="8" width="4" height="1" rx="0.5" fill="#2196F3" opacity="0.7"/></g>
<g class="data d3"><rect x="8" y="14" width="2" height="1" rx="0.5" fill="#FF9800" opacity="0.7"/></g>
<!-- Tail -->
<g class="tail-fast"><path d="M46,46 Q62,36 58,50" fill="none" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/></g>
<!-- Body -->
<g class="bounce">
  <ellipse cx="32" cy="42" rx="16" ry="12" fill="#FF9800"/>
  <ellipse cx="32" cy="40" rx="14" ry="10" fill="#FFB74D"/>
  <ellipse cx="32" cy="24" rx="14" ry="12" fill="#FF9800"/>
  <polygon points="18,16 22,4 28,16" fill="#FF9800"/><polygon points="20,16 23,8 26,16" fill="#FFB74D"/>
  <polygon points="36,16 42,4 46,16" fill="#FF9800"/><polygon points="38,16 41,8 44,16" fill="#FFB74D"/>
  <!-- Eyes: focused -->
  <ellipse cx="26" cy="22" rx="3.5" ry="3" fill="white"/>
  <ellipse cx="38" cy="22" rx="3.5" ry="3" fill="white"/>
  <ellipse cx="27" cy="22" rx="2" ry="2.5" fill="#1a1a2e"/>
  <ellipse cx="39" cy="22" rx="2" ry="2.5" fill="#1a1a2e"/>
  <circle cx="28" cy="21" r="0.8" fill="white"/>
  <circle cx="40" cy="21" r="0.8" fill="white"/>
  <polygon points="32,27 30,29 34,29" fill="#E91E63"/>
  <path d="M29,30 Q32,33 35,30" fill="none" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
  <!-- Paws typing -->
  <g class="paw-l"><ellipse cx="20" cy="52" rx="5" ry="3" fill="#FF9800"/></g>
  <g class="paw-r"><ellipse cx="44" cy="52" rx="5" ry="3" fill="#FF9800"/></g>
  <!-- Laptop -->
  <rect x="14" y="48" width="36" height="4" rx="1" fill="#455A64"/>
  <rect x="16" y="44" width="32" height="5" rx="1" fill="#37474F"/>
  <rect x="17" y="45" width="30" height="3" rx="0.5" fill="#4FC3F7" opacity="0.6"/>
</g>

<g class="sweep"><style>.sweep{animation:sweep 1.4s infinite ease-in-out;transform-origin:43px 45px}@keyframes sweep{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(10deg)}}</style><line x1="43" y1="28" x2="52" y2="55" stroke="#92400e" stroke-width="3" stroke-linecap="round"/><path d="M47 53 L58 50 L59 57 L48 58 Z" fill="#fbbf24" stroke="#92400e" stroke-width="1"/></g>
</svg>