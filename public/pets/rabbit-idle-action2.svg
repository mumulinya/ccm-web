<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    /* 🐰 蹦跳 — 6秒循环 */
    .hop-body {
      transform-origin: 32px 52px;
      animation: hop-body 6s infinite ease-in-out;
    }
    .ear-flop {
      transform-origin: 32px 24px;
      animation: ear-flop 6s infinite ease-in-out;
    }
    .eyes-bright {
      transform-origin: 32px 28px;
      animation: eyes-bright 6s infinite linear;
    }
    .hop-shadow {
      animation: hop-shadow 6s infinite ease-in-out;
    }
    .paw-kick {
      transform-origin: 32px 55px;
      animation: paw-kick 6s infinite ease-in-out;
    }
    .heart1 { animation: heart-float1 3s infinite ease-out; }
    .heart2 { animation: heart-float2 3s 1s infinite ease-out; }
    .heart3 { animation: heart-float3 3s 2s infinite ease-out; }
    .breathe {
      transform-origin: 32px 46px;
      animation: breathe 3s infinite ease-in-out;
    }

    @keyframes hop-body {
      0%,100%  { transform: translateY(0) scale(1,1); }
      8%       { transform: translateY(1px) scale(1.03,0.97); }
      15%      { transform: translateY(-12px) scale(0.97,1.05); }
      22%      { transform: translateY(-14px) scale(0.96,1.06); }
      32%      { transform: translateY(-8px) scale(0.98,1.03); }
      40%      { transform: translateY(0) scale(1.04,0.96); }
      45%      { transform: translateY(0) scale(1,1); }
      55%      { transform: translateY(1px) scale(1.03,0.97); }
      62%      { transform: translateY(-10px) scale(0.97,1.04); }
      70%      { transform: translateY(-11px) scale(0.96,1.05); }
      80%      { transform: translateY(-5px) scale(0.98,1.02); }
      88%      { transform: translateY(0) scale(1.03,0.97); }
      92%      { transform: translateY(0) scale(1,1); }
    }
    @keyframes ear-flop {
      0%,100%  { transform: rotate(0deg); }
      12%      { transform: rotate(8deg); }
      15%      { transform: rotate(-10deg); }
      22%      { transform: rotate(5deg); }
      30%      { transform: rotate(-3deg); }
      38%,50%  { transform: rotate(0deg); }
      58%      { transform: rotate(-8deg); }
      62%      { transform: rotate(10deg); }
      70%      { transform: rotate(-5deg); }
      78%      { transform: rotate(3deg); }
      85%      { transform: rotate(0deg); }
    }
    @keyframes eyes-bright {
      0%,8%    { transform: scaleY(1); }
      10%      { transform: scaleY(0.1); }
      12%,38%  { transform: scaleY(1); }
      40%      { transform: scaleY(0.1); }
      42%,58%  { transform: scaleY(1); }
      60%      { transform: scaleY(0.1); }
      62%,88%  { transform: scaleY(1); }
      90%      { transform: scaleY(0.1); }
      92%,100% { transform: scaleY(1); }
    }
    @keyframes hop-shadow {
      0%,100%  { transform: scaleX(1); opacity: 0.15; }
      15%,22%  { transform: scaleX(0.6); opacity: 0.08; }
      40%      { transform: scaleX(1.1); opacity: 0.18; }
      45%,50%  { transform: scaleX(1); opacity: 0.15; }
      62%,70%  { transform: scaleX(0.65); opacity: 0.08; }
      88%      { transform: scaleX(1.1); opacity: 0.18; }
    }
    @keyframes paw-kick {
      0%,10%   { transform: rotate(0deg); }
      15%,25%  { transform: rotate(15deg); }
      30%,50%  { transform: rotate(0deg); }
      60%,72%  { transform: rotate(-12deg); }
      80%,100% { transform: rotate(0deg); }
    }
    @keyframes heart-float1 {
      0%   { transform: translate(0,0) scale(0); opacity:0; }
      15%  { transform: translate(-3px,-5px) scale(1); opacity:1; }
      60%  { transform: translate(-6px,-15px) scale(1); opacity:0.7; }
      100% { transform: translate(-8px,-25px) scale(0.5); opacity:0; }
    }
    @keyframes heart-float2 {
      0%   { transform: translate(0,0) scale(0); opacity:0; }
      15%  { transform: translate(3px,-4px) scale(1); opacity:1; }
      60%  { transform: translate(5px,-14px) scale(1); opacity:0.7; }
      100% { transform: translate(7px,-24px) scale(0.5); opacity:0; }
    }
    @keyframes heart-float3 {
      0%   { transform: translate(0,0) scale(0); opacity:0; }
      15%  { transform: translate(0px,-5px) scale(1); opacity:1; }
      60%  { transform: translate(-2px,-16px) scale(1); opacity:0.6; }
      100% { transform: translate(-4px,-26px) scale(0.5); opacity:0; }
    }
    @keyframes breathe {
      0%,100% { transform: scale(1) translateY(0); }
      50%     { transform: scale(1.02,0.98) translateY(0.5px); }
    }
  </style>
</defs>

<!-- 影子 -->
<ellipse class="hop-shadow" cx="32" cy="60" rx="16" ry="3" fill="#000" opacity="0.15"/>

<!-- 爱心 -->
<g class="heart1" transform="translate(48,15)">
  <text font-size="7" fill="#f43f5e">♥</text>
</g>
<g class="heart2" transform="translate(52,18)">
  <text font-size="5" fill="#fb7185">♥</text>
</g>
<g class="heart3" transform="translate(46,20)">
  <text font-size="6" fill="#fda4af">♥</text>
</g>

<g class="hop-body">
  <g class="breathe">
    <!-- 尾巴 -->
    <circle cx="16" cy="48" r="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- 身体 -->
    <ellipse cx="32" cy="46" rx="16" ry="13" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="32" cy="46" r="9" fill="#ffffff"/>
    
    <!-- 肢爪 -->
    <g class="paw-kick">
      <circle cx="22" cy="55" r="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
      <circle cx="42" cy="55" r="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
    </g>

    <g class="ear-flop">
      <!-- 大耳朵 -->
      <path d="M 20 24 C 18 10, 24 6, 26 24 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <path d="M 21 22 C 20 12, 23 9, 24 22 Z" fill="#fecdd3"/>
      <path d="M 44 24 C 46 10, 40 6, 38 24 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <path d="M 43 22 C 44 12, 41 9, 40 22 Z" fill="#fecdd3"/>
    </g>

    <!-- 头部底盘 -->
    <circle cx="32" cy="30" r="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

    <g class="eyes-bright">
      <!-- 大圆眼 (兴奋) -->
      <circle cx="25" cy="28" r="3.5" fill="#f43f5e"/>
      <circle cx="26.5" cy="26.5" r="1.3" fill="#ffffff"/>
      <circle cx="24" cy="28.5" r="0.5" fill="#ffffff"/>
      <circle cx="39" cy="28" r="3.5" fill="#f43f5e"/>
      <circle cx="37.5" cy="26.5" r="1.3" fill="#ffffff"/>
      <circle cx="40" cy="28.5" r="0.5" fill="#ffffff"/>
    </g>

    <!-- 腮红 -->
    <circle cx="19" cy="34" r="2.5" fill="#fda4af" opacity="0.7"/>
    <circle cx="45" cy="34" r="2.5" fill="#fda4af" opacity="0.7"/>

    <!-- 鼻子 -->
    <polygon points="31,33 33,33 32,34.5" fill="#f43f5e"/>
    
    <!-- 嘴巴 (开心) -->
    <path d="M 28,35 Q 32,39 36,35" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</g>
</svg>
