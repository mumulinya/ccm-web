<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
<defs>
  <style>
    .body-bounce { transform-origin: 7.5px 15px; animation: bounce 0.35s infinite ease-in-out; }
    .breathe { transform-origin: 7.5px 13px; animation: breathe 3.2s infinite ease-in-out; }
    .arm-l { transform-origin: 2px 10px; animation: type-l 0.15s infinite ease-in-out; }
    .arm-r { transform-origin: 13px 10px; animation: type-r 0.12s infinite ease-in-out; }
    .eyes-code { transform-origin: 7.5px 9px; animation: eye-code 10s infinite ease-in-out; }
    .code-line { transform-box: fill-box; transform-origin: left center; }
    .cl1{animation:cl1 6s infinite} .cl2{animation:cl2 6s infinite} .cl3{animation:cl3 6s infinite} .cl4{animation:cl4 6s infinite}
    .key-flash{opacity:0} .kf1{animation:kf 0.6s infinite} .kf2{animation:kf 0.8s infinite;animation-delay:-0.25s} .kf3{animation:kf 0.5s infinite;animation-delay:-0.1s}
    .data-bit{opacity:0;animation:float-d 1.5s infinite linear} .d1{animation-delay:0s} .d2{animation-delay:-0.4s} .d3{animation-delay:-0.8s}
    .shadow-anim{transform-origin:7.5px 15.5px;animation:sb 0.4s infinite ease-in-out}
    @keyframes bounce{0%,100%{transform:translateY(0)} 50%{transform:translateY(0.8px)}}
    @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)} 50%{transform:scale(1.02,0.98) translate(0,0.5px)}}
    @keyframes sb{0%,100%{transform:scaleX(1.02);opacity:0.5} 50%{transform:scaleX(1.05);opacity:0.55}}
    @keyframes type-l{0%{transform:rotate(-5deg)} 25%{transform:rotate(-38deg)} 50%{transform:rotate(-10deg)} 75%{transform:rotate(-30deg)} 100%{transform:rotate(-5deg)}}
    @keyframes type-r{0%{transform:rotate(5deg)} 25%{transform:rotate(38deg)} 50%{transform:rotate(10deg)} 75%{transform:rotate(30deg)} 100%{transform:rotate(5deg)}}
    @keyframes eye-code{0%{transform:translate(0,1px) scaleY(0.6)} 14%{transform:translate(0,1px) scaleY(0.6)} 15%{transform:translate(0,1px) scaleY(0.1)} 16%{transform:translate(0,1px) scaleY(0.6)} 54%{transform:translate(0,1px) scaleY(0.6)} 55%{transform:translate(0,1px) scaleY(0.1)} 57%{transform:translate(-1px,-0.5px) scaleY(1)} 62%{transform:translate(1.5px,-0.5px) scaleY(1)} 64%{transform:translate(-0.5px,-0.3px) scaleY(1)} 73%{transform:translate(0,1px) scaleY(0.6)} 89%{transform:translate(0,1px) scaleY(0.6)} 90%{transform:translate(0,1px) scaleY(0.1)} 91%{transform:translate(0,1px) scaleY(0.6)} 100%{transform:translate(0,1px) scaleY(0.6)}}
    @keyframes cl1{0%{transform:scaleX(0);opacity:0} 3%{transform:scaleX(0);opacity:1} 13%{transform:scaleX(1);opacity:1} 13%,78%{transform:scaleX(1) translateY(0);opacity:1} 88%{transform:scaleX(1) translateY(-3px);opacity:0} 89%,100%{transform:scaleX(0);opacity:0}}
    @keyframes cl2{0%,14%{transform:scaleX(0);opacity:0} 15%{opacity:1} 27%{transform:scaleX(1)} 27%,82%{transform:scaleX(1) translateY(0);opacity:1} 91%{transform:scaleX(1) translateY(-3px);opacity:0} 92%,100%{transform:scaleX(0);opacity:0}}
    @keyframes cl3{0%,29%{transform:scaleX(0);opacity:0} 30%{opacity:1} 42%{transform:scaleX(1)} 42%,85%{transform:scaleX(1) translateY(0);opacity:1} 93%{transform:scaleX(1) translateY(-3px);opacity:0} 94%,100%{transform:scaleX(0);opacity:0}}
    @keyframes cl4{0%,44%{transform:scaleX(0);opacity:0} 45%{opacity:1} 57%{transform:scaleX(1)} 57%,88%{transform:scaleX(1) translateY(0);opacity:1} 95%{transform:scaleX(1) translateY(-3px);opacity:0} 96%,100%{transform:scaleX(0);opacity:0}}
    @keyframes kf{0%,70%,100%{opacity:0} 35%{opacity:0.8}}
    @keyframes float-d{0%{transform:translateY(0) scale(0.5);opacity:0} 10%{opacity:0.8} 100%{transform:translateY(-17px) scale(1);opacity:0}}
  </style>
  <g id="pp"><rect width="1.5" height="1.5"/></g>
</defs>
<rect class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
<g fill="#40C4FF"><use href="#pp" class="data-bit d1" x="3" y="7"/><use href="#pp" class="data-bit d2" x="7" y="8"/><use href="#pp" class="data-bit d3" x="11" y="7"/></g>
<g transform="translate(1.25,0)">
  <rect x="-0.5" y="-6" width="13.5" height="10.5" fill="#1E1E2E" rx="0.3"/>
  <rect x="-0.5" y="-6" width="13.5" height="1.2" fill="#2D2D3D" rx="0.3"/>
  <rect x="0.3" y="-5.6" width="0.5" height="0.4" fill="#FF5F56"/><rect x="1.2" y="-5.6" width="0.5" height="0.4" fill="#FFBD2E"/><rect x="2.1" y="-5.6" width="0.5" height="0.4" fill="#27C93F"/>
  <rect class="code-line cl1" x="0.5" y="-3.5" width="5" height="0.7" fill="#4CAF50" opacity="0.8"/>
  <rect class="code-line cl2" x="2" y="-1.8" width="8" height="0.7" fill="#4CAF50" opacity="0.8"/>
  <rect class="code-line cl3" x="2" y="-0.1" width="4.5" height="0.7" fill="#40C4FF" opacity="0.7"/>
  <rect class="code-line cl4" x="0.5" y="1.6" width="2" height="0.7" fill="#FFC107" opacity="0.7"/>
</g>
<g class="body-bounce"><g class="breathe">
  <g fill="#E8614D"><rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/><rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/><rect x="2" y="6" width="11" height="7"/></g>
  <g class="eyes-code" fill="#000"><rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/></g>
</g></g>
<g transform="translate(-0.5,11.8)">
  <rect width="16" height="3.2" fill="#455A64" rx="0.3"/>
  <g fill="#78909C"><rect x="0.5" y="0.4" width="1" height="0.7"/><rect x="1.8" y="0.4" width="1" height="0.7"/><rect x="3.5" y="0.4" width="6" height="0.7" rx="0.2"/><rect x="10.2" y="0.4" width="1" height="0.7"/><rect x="11.5" y="0.4" width="1" height="0.7"/></g>
  <g fill="#78909C"><rect x="0.8" y="1.3" width="0.9" height="0.7"/><rect x="2.0" y="1.3" width="0.9" height="0.7"/><rect x="3.2" y="1.3" width="0.9" height="0.7"/><rect x="4.4" y="1.3" width="0.9" height="0.7"/><rect x="5.6" y="1.3" width="0.9" height="0.7"/><rect x="6.8" y="1.3" width="0.9" height="0.7"/><rect x="8.0" y="1.3" width="0.9" height="0.7"/><rect x="9.2" y="1.3" width="0.9" height="0.7"/><rect x="10.4" y="1.3" width="0.9" height="0.7"/><rect x="11.6" y="1.3" width="0.9" height="0.7"/><rect x="12.8" y="1.3" width="0.9" height="0.7"/><rect x="14.0" y="1.3" width="0.9" height="0.7"/></g>
  <g fill="#B0BEC5"><rect class="key-flash kf1" x="4.4" y="1.3" width="0.9" height="0.7"/><rect class="key-flash kf2" x="9.2" y="1.3" width="0.9" height="0.7"/><rect class="key-flash kf3" x="2.9" y="2.2" width="0.9" height="0.7"/></g>
</g>
<g class="body-bounce"><g class="breathe"><g fill="#E8614D"><g class="arm-l"><rect x="0" y="9" width="2" height="2"/></g><g class="arm-r"><rect x="13" y="9" width="2" height="2"/></g></g></g></g>
</svg>