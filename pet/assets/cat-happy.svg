<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="500" height="500">
<defs>
  <style>
    .jump { transform-origin: 32px 50px; animation: jump 0.6s infinite ease-in-out; }
    @keyframes jump { 0%,100%{transform:translateY(0) scale(1)} 30%{transform:translateY(-12px) scale(1.05,0.95)} 50%{transform:translateY(-14px) scale(0.95,1.05)} 80%{transform:translateY(0) scale(1.05,0.95)} }
    .sparkle { opacity:0; animation: sparkle 1s infinite ease-out; }
    .s1{animation-delay:0s} .s2{animation-delay:0.3s} .s3{animation-delay:0.6s} .s4{animation-delay:0.15s}
    @keyframes sparkle { 0%{opacity:0;transform:scale(0) rotate(0)} 30%{opacity:1;transform:scale(1) rotate(45deg)} 100%{opacity:0;transform:scale(0.5) rotate(90deg)} }
  </style>
</defs>
<ellipse cx="32" cy="58" rx="14" ry="3" fill="#000" opacity="0.1"/>
<!-- Sparkles -->
<g class="sparkle s1"><text x="6" y="12" font-size="8" fill="#FFD700">✨</text></g>
<g class="sparkle s2"><text x="48" y="10" font-size="6" fill="#FFD700">✨</text></g>
<g class="sparkle s3"><text x="12" y="6" font-size="5" fill="#FFD700">⭐</text></g>
<g class="sparkle s4"><text x="52" y="18" font-size="7" fill="#FFD700">✨</text></g>
<g class="jump">
  <ellipse cx="32" cy="42" rx="16" ry="12" fill="#FF9800"/>
  <ellipse cx="32" cy="40" rx="14" ry="10" fill="#FFB74D"/>
  <ellipse cx="32" cy="24" rx="14" ry="12" fill="#FF9800"/>
  <polygon points="18,16 22,4 28,16" fill="#FF9800"/><polygon points="20,16 23,8 26,16" fill="#FFB74D"/>
  <polygon points="36,16 42,4 46,16" fill="#FF9800"/><polygon points="38,16 41,8 44,16" fill="#FFB74D"/>
  <!-- Happy closed eyes -->
  <path d="M22,22 Q26,18 30,22" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M34,22 Q38,18 42,22" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M24,28 Q32,36 40,28" fill="#E91E63" stroke="#E65100" stroke-width="1"/>
  <!-- Blush -->
  <ellipse cx="20" cy="26" rx="4" ry="2.5" fill="#F48FB1" opacity="0.4"/>
  <ellipse cx="44" cy="26" rx="4" ry="2.5" fill="#F48FB1" opacity="0.4"/>
  <!-- Tail wagging fast -->
  <path d="M46,46 Q64,34 60,52" fill="none" stroke="#FF9800" stroke-width="4" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="-5,50,48;15,50,48;-5,50,48" dur="0.4s" repeatCount="indefinite"/>
  </path>
  <ellipse cx="22" cy="52" rx="5" ry="3" fill="#FF9800"/>
  <ellipse cx="42" cy="52" rx="5" ry="3" fill="#FF9800"/>
</g>
</svg>