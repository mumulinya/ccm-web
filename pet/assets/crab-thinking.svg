<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
<defs>
  <style>
    .float{transform-origin:7.5px 13px;animation:float 2.5s infinite ease-in-out}
    .bubble{opacity:0;animation:bub 2.5s infinite ease-out}
    .b1{animation-delay:0s} .b2{animation-delay:0.8s} .b3{animation-delay:1.6s}
    @keyframes float{0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)}}
    @keyframes bub{0%{opacity:0;transform:translateY(4px) scale(0.5)} 30%{opacity:0.7;transform:translateY(0) scale(1)} 80%{opacity:0.7;transform:translateY(-6px) scale(1)} 100%{opacity:0;transform:translateY(-10px) scale(0.5)}}
  </style>
</defs>
<rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.4"/>
<circle class="bubble b1" cx="18" cy="4" r="1.5" fill="#B39DDB" opacity="0.5"/>
<circle class="bubble b2" cx="21" cy="-1" r="2" fill="#B39DDB" opacity="0.4"/>
<circle class="bubble b3" cx="24" cy="-6" r="2.5" fill="#B39DDB" opacity="0.3"/>
<g class="float">
  <g fill="#E8614D"><rect x="3" y="11" width="1" height="4"/><rect x="5" y="11" width="1" height="4"/><rect x="9" y="11" width="1" height="4"/><rect x="11" y="11" width="1" height="4"/><rect x="2" y="6" width="11" height="7"/><rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/></g>
  <!-- Eyes looking up -->
  <g fill="#000"><rect x="4" y="7" width="1" height="2"/><rect x="10" y="7" width="1" height="2"/></g>
  <!-- Paw on chin -->
  <rect x="6" y="10" width="2" height="2" fill="#FFB09E" opacity="0.8"/>
</g>
</svg>