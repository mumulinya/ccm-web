<?xml version="1.0" encoding="UTF-8"?>
<svg id="rabbit-juggling" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Rabbit juggling">

  <defs>
    <linearGradient id="rabbit-juggling-body" x1="28" y1="18" x2="96" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff4fb"/>
    </linearGradient>
    <linearGradient id="rabbit-juggling-accent" x1="36" y1="18" x2="90" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb7d5"/>
      <stop offset="1" stop-color="#74647d"/>
    </linearGradient>
    <radialGradient id="rabbit-juggling-shine" cx="36%" cy="24%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#ffffff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="rabbit-juggling-soft-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#10203a" flood-opacity="0.14"/>
    </filter>
    <filter id="rabbit-juggling-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .pet-core { transform-origin:64px 72px; animation: pet-breathe 1.2s ease-in-out infinite; }
    .tail { transform-origin:76px 75px; animation: tail-sway 2.4s ease-in-out infinite; }
    .ear { transform-origin:center; animation: ear-twitch 5s ease-in-out infinite; }
    .arm-left { transform-origin:46px 74px; animation: arm-left 2.1s ease-in-out infinite; }
    .arm-right { transform-origin:82px 74px; animation: arm-right 2.1s ease-in-out infinite; }
    .blink { transform-origin:center; animation: blink 5.2s ease-in-out infinite; }
    .float-prop { animation: prop-float 2.4s ease-in-out infinite; }
    .pulse { animation: pulse 1.3s ease-in-out infinite; transform-origin:center; }
    .spin { animation: spin 3.2s linear infinite; transform-origin:center; }
    .work-tap { animation: tap 0.55s ease-in-out infinite; transform-origin:64px 95px; }
    .sleep-drift { animation: sleep-drift 3.6s ease-in-out infinite; }
    .music-note { animation: note-rise 1.8s ease-in-out infinite; opacity:0; }
    .music-note.n2 { animation-delay:0.45s; }
    .music-note.n3 { animation-delay:0.9s; }
    .juggle-ball { animation: juggle 1.25s ease-in-out infinite; }
    .juggle-ball.b2 { animation-delay:0.22s; }
    .juggle-ball.b3 { animation-delay:0.44s; }
    .spark { animation: sparkle 1.7s ease-in-out infinite; transform-origin:center; }
    .spark.s2 { animation-delay:0.35s; }
    .spark.s3 { animation-delay:0.7s; }
    .state-error .pet-core { animation: shake 0.28s linear infinite; }
    .state-sweeping .arm-right { animation: sweep 0.9s ease-in-out infinite; }
    .state-react .pet-core { animation: pop 0.75s ease-in-out infinite; }
    .state-sleeping .pet-core, .state-dozing .pet-core, .state-collapsing .pet-core { animation: sleep-breathe 3.8s ease-in-out infinite; }
    @keyframes pet-breathe { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.025,0.985)} }
    @keyframes sleep-breathe { 0%,100%{transform:translateY(1px) scale(1,0.98)} 50%{transform:translateY(-1px) scale(1.02,1)} }
    @keyframes tail-sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(9deg)} }
    @keyframes ear-twitch { 0%,92%,100%{transform:rotate(0)} 95%{transform:rotate(-8deg)} }
    @keyframes arm-left { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-7deg)} }
    @keyframes arm-right { 0%,100%{transform:rotate(0)} 50%{transform:rotate(7deg)} }
    @keyframes blink { 0%,91%,100%{transform:scaleY(1)} 94%{transform:scaleY(0.12)} }
    @keyframes prop-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pulse { 0%,100%{transform:scale(1); opacity:.72} 50%{transform:scale(1.18); opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes tap { 0%,100%{transform:translateY(0)} 50%{transform:translateY(2px)} }
    @keyframes sleep-drift { 0%{transform:translate(0,0);opacity:0} 20%{opacity:1} 100%{transform:translate(12px,-22px);opacity:0} }
    @keyframes note-rise { 0%{transform:translateY(8px) scale(.8);opacity:0} 25%{opacity:1} 100%{transform:translateY(-18px) scale(1.08);opacity:0} }
    @keyframes juggle { 0%,100%{transform:translateY(7px)} 50%{transform:translateY(-15px)} }
    @keyframes sparkle { 0%,100%{transform:scale(.75) rotate(0);opacity:.45} 50%{transform:scale(1.15) rotate(16deg);opacity:1} }
    @keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,1px)} 75%{transform:translate(1px,-1px)} }
    @keyframes sweep { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(18deg)} }
    @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.055)} }
  </style>
  <ellipse cx="64" cy="116" rx="34" ry="7" fill="#0f172a" opacity=".12"/>
  <g class="state-juggling" >
    <g class="pet-core">
      
    <g filter="url(#rabbit-juggling-soft-shadow)">
      <path class="ear" d="M48 33 C38 -3 54 -12 61 30" fill="url(#rabbit-juggling-body)" stroke="#7b6678" stroke-width="4" stroke-linejoin="round"/>
      <path class="ear" d="M80 33 C92 -3 76 -12 68 30" fill="url(#rabbit-juggling-body)" stroke="#7b6678" stroke-width="4" stroke-linejoin="round"/>
      <path d="M51 27 C46 5 54 1 58 30" fill="#ffb7d5" opacity=".6"/>
      <path d="M77 27 C84 5 76 1 71 30" fill="#ffb7d5" opacity=".6"/>
      <ellipse cx="64" cy="84" rx="34" ry="28" fill="url(#rabbit-juggling-body)" stroke="#7b6678" stroke-width="4"/>
      <ellipse cx="64" cy="90" rx="21" ry="15" fill="#ffffff" opacity=".95"/>
      <ellipse cx="52" cy="106" rx="8.5" ry="5.8" fill="#ffffff" stroke="#7b6678" stroke-width="2.4"/>
      <ellipse cx="76" cy="106" rx="8.5" ry="5.8" fill="#ffffff" stroke="#7b6678" stroke-width="2.4"/>
      <circle cx="64" cy="50" r="30" fill="url(#rabbit-juggling-body)" stroke="#7b6678" stroke-width="4"/>
      <circle cx="53" cy="43" r="15" fill="url(#rabbit-juggling-shine)" opacity=".72"/>
      <ellipse cx="64" cy="63" rx="14" ry="10" fill="#ffffff" opacity=".98"/>
      
    <g class="blink">
      <ellipse cx="53" cy="51" rx="6.7" ry="7.4" fill="#4a4252"/>
      <ellipse cx="75" cy="51" rx="6.7" ry="7.4" fill="#4a4252"/>
      <circle cx="55.1" cy="48.6" r="2.1" fill="#fff"/>
      <circle cx="77.1" cy="48.6" r="2.1" fill="#fff"/>
      <circle cx="51.3" cy="53.7" r="1.1" fill="#fff" opacity=".55"/>
      <circle cx="73.3" cy="53.7" r="1.1" fill="#fff" opacity=".55"/>
    </g>
      <path d="M60 59 Q64 62 68 59" stroke="#ef7aa8" stroke-width="2.7" fill="none" stroke-linecap="round"/>
      <path d="M55 65 Q64 74 73 65" stroke="#5d5064" stroke-width="3" fill="none" stroke-linecap="round"/>
      
    <ellipse cx="42" cy="63" rx="5.5" ry="3.8" fill="#ff9fc4" opacity=".5"/>
    <ellipse cx="86" cy="63" rx="5.5" ry="3.8" fill="#ff9fc4" opacity=".5"/>
      <circle cx="94" cy="84" r="8" fill="#ffffff" stroke="#7b6678" stroke-width="2.4" opacity=".95"/>
    </g>
    </g>
    
      <g>
        <path d="M43 42 C43 25 85 25 85 42" fill="none" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
        <rect x="36" y="41" width="10" height="18" rx="4" fill="#1e293b"/>
        <rect x="82" y="41" width="10" height="18" rx="4" fill="#1e293b"/>
        <circle class="juggle-ball" cx="47" cy="21" r="5" fill="#22d3ee"/>
        <circle class="juggle-ball b2" cx="64" cy="14" r="5" fill="#facc15"/>
        <circle class="juggle-ball b3" cx="81" cy="21" r="5" fill="#fb7185"/>
        <text class="music-note" x="28" y="52" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#74647d">♪</text>
        <text class="music-note n2" x="96" y="52" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#74647d">♫</text>
      </g>
  </g>
</svg>
